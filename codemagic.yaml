workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build split APKs (release — smaller per-device downloads)
        script: |
          # --split-per-abi tells Flutter to produce one APK per CPU architecture.
          # The arm64-v8a APK (modern phones) is ~35-45% smaller than a fat APK.
          flutter build apk --release --split-per-abi

      - name: Build debug APK (for quick device testing)
        script: |
          flutter build apk --debug

    artifacts:
      - build/**/outputs/**/*.apk
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - your@email.com        # ← replace with your email
        notify:
          success: true
          failure: true
