workflows:
  android-release:
    name: Android Release (arm64-v8a)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Pin Gradle wrapper to 8.13
        script: |
          WRAPPER="$CM_BUILD_DIR/android/gradle/wrapper/gradle-wrapper.properties"
          cat > "$WRAPPER" << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-all.zip
          PROPS
          echo "=== Wrapper pinned ==="
          cat "$WRAPPER"

      - name: Flutter pub get
        script: flutter pub get

      - name: Build arm64-v8a release APK
        script: |
          flutter build apk --release
          # arm64-v8a is already enforced via ndk.abiFilters in android/app/build.gradle

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your@email.com   # ← replace with your email
        notify:
          success: true
          failure: true
