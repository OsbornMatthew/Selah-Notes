workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Fix Gradle version (override Codemagic auto-upgrade)
        script: |
          cd $CM_BUILD_DIR/android
          sed -i '' 's/distributionUrl=.*/distributionUrl=https\\:\/\/services.gradle.org\/distributions\/gradle-8.13-all.zip/' \
            gradle/wrapper/gradle-wrapper.properties
          echo "Gradle wrapper now set to:"
          cat gradle/wrapper/gradle-wrapper.properties | grep distributionUrl

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build split APKs (release)
        script: |
          # Builds a separate smaller APK per ABI — arm64-v8a is what most
          # modern Android devices use and is ~40% smaller than a fat APK.
          flutter build apk --release --split-per-abi

      - name: Build fat APK (debug, for quick testing)
        script: |
          flutter build apk --debug

    artifacts:
      - build/**/outputs/**/*.apk
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - your@email.com        # ← replace with your email
        notify:
          success: true
          failure: true
