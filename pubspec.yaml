name: selah_notes
description: "Selah Notes — a dark, gold, glassmorphic notes app with folders"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  uuid: ^4.3.3
  intl: ^0.20.2
  google_fonts: ^6.2.1
  share_plus: ^10.1.2
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  # Rich text editor (formatting: size, color)
  flutter_quill: ^10.8.4
  # Export features
  pdf: ^3.11.1
  screenshot: ^3.0.0
  path_provider: ^2.1.2
  # Pattern lock for archive
  pattern_lock: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
